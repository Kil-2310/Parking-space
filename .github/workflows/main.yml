name: CI

on:
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v
      - name: Check formatting
        run: black --diff --check app.py database/models.py
      - name: Lint
        run: flake8 app.py main.py
      - name: Pytest
        run: pytest tests/test_with_factory.py tests/test_app.py